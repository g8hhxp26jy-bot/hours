<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hours</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111;
    --surface: #1c1c1c;
    --border: #2e2e2e;
    --accent: #e8ff57;
    --text: #f5f5f5;
    --muted: #555;
    --danger: #ff4f4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
    padding: 24px;
    width: 100%;
  }
  #login-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 6px;
    color: var(--accent);
    line-height: 1;
  }
  #login-sub {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .pin-dots { display: flex; gap: 14px; margin: 4px 0; }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--muted);
    transition: background 0.15s, border-color 0.15s;
  }
  .dot.filled { background: var(--accent); border-color: var(--accent); }
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    gap: 12px;
  }
  .key {
    height: 72px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    cursor: pointer;
    transition: background 0.12s, transform 0.08s;
    display: flex; align-items: center; justify-content: center;
  }
  .key:active { transform: scale(0.93); background: #2a2a2a; }
  .key.del { font-size: 16px; color: var(--muted); }
  .key.zero { grid-column: 2; }
  #login-error {
    color: var(--danger);
    font-size: 11px;
    letter-spacing: 1px;
    min-height: 16px;
  }
  .change-pw-btn {
    background: none; border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer; text-decoration: underline;
  }
  .change-pw-btn:hover { color: var(--text); }

  /* APP */
  #app {
    display: none;
    flex-direction: column;
    width: 100%; max-width: 420px;
    padding: 28px 20px 80px;
    gap: 24px;
  }
  .top-bar { display: flex; justify-content: space-between; align-items: flex-end; }
  .top-bar h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; letter-spacing: 4px;
    color: var(--accent); line-height: 1;
  }
  .today-label {
    font-size: 11px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase;
    text-align: right; line-height: 1.6;
  }
  .today-label span { display: block; color: var(--text); font-size: 13px; }

  .shifts { display: flex; gap: 12px; }
  .shift-btn {
    flex: 1; padding: 22px 0;
    border-radius: 16px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 2px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.08s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .shift-btn small {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    color: var(--muted); font-weight: 300;
  }
  .shift-btn:hover { border-color: var(--accent); }
  .shift-btn:active { transform: scale(0.96); }

  .month-tabs { display: flex; gap: 8px; }
  .month-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .month-tab.active { background: var(--accent); border-color: var(--accent); color: #111; }

  .log-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .log-header-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .log-total { font-size: 12px; color: var(--accent); letter-spacing: 1px; }

  .log-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .log-entry {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border-radius: 12px; padding: 14px 16px;
    border: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-date { display: flex; flex-direction: column; gap: 2px; }
  .entry-day { font-size: 18px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; line-height: 1; }
  .entry-weekday { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .entry-hours { font-size: 28px; font-family: 'Bebas Neue', sans-serif; color: var(--accent); letter-spacing: 2px; }
  .entry-delete {
    background: none; border: 1px solid transparent;
    color: var(--muted); font-size: 14px;
    cursor: pointer; padding: 6px 8px;
    border-radius: 8px; transition: color 0.15s, border-color 0.15s;
    line-height: 1;
  }
  .entry-delete:hover { color: var(--danger); border-color: var(--danger); }

  .empty-log { text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 1px; padding: 30px 0; }

  .lock-btn {
    position: fixed; bottom: 24px; right: 20px;
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--muted); font-size: 18px;
    width: 44px; height: 44px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s;
  }
  .lock-btn:hover { color: var(--text); border-color: var(--text); }

  #toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #111;
    font-size: 12px; font-family: 'DM Mono', monospace;
    letter-spacing: 1px; padding: 10px 20px;
    border-radius: 20px; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="login-screen">
  <h1>HOURS</h1>
  <p id="login-sub">enter pin</p>
  <div class="pin-dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <div id="login-error"></div>
  <div class="keypad">
    <button class="key" onclick="pressKey('1')">1</button>
    <button class="key" onclick="pressKey('2')">2</button>
    <button class="key" onclick="pressKey('3')">3</button>
    <button class="key" onclick="pressKey('4')">4</button>
    <button class="key" onclick="pressKey('5')">5</button>
    <button class="key" onclick="pressKey('6')">6</button>
    <button class="key" onclick="pressKey('7')">7</button>
    <button class="key" onclick="pressKey('8')">8</button>
    <button class="key" onclick="pressKey('9')">9</button>
    <button class="key del" onclick="deleteKey()">⌫</button>
    <button class="key zero" onclick="pressKey('0')">0</button>
  </div>
  <button class="change-pw-btn" id="change-pw-btn" style="display:none" onclick="startChangePin()">change pin</button>
</div>

<div id="app">
  <div class="top-bar">
    <h1>HOURS</h1>
    <div class="today-label">today<span id="today-display"></span></div>
  </div>

  <div class="shifts">
    <button class="shift-btn" onclick="logShift(5)">5<small>hours</small></button>
    <button class="shift-btn" onclick="logShift(7)">7<small>hours</small></button>
    <button class="shift-btn" onclick="logShift(13)">13<small>hours</small></button>
  </div>

  <div class="month-tabs">
    <button class="month-tab active" id="tab-current" onclick="showMonth('current')"></button>
    <button class="month-tab" id="tab-prev" onclick="showMonth('prev')"></button>
  </div>

  <div>
    <div class="log-header">
      <span class="log-header-label">Log</span>
      <span class="log-total" id="log-total"></span>
    </div>
    <div class="log-list" id="log-list"></div>
  </div>

  <button class="lock-btn" onclick="lockApp()">🔒</button>
</div>

<div id="toast"></div>

<script>
  const PIN_KEY = 'hours_pin';
  const DATA_KEY = 'hours_log';
  const DEFAULT_PIN = '1992';

  let pinInput = '';
  let activeMonth = 'current';
  let changingPin = false;
  let newPinStep = 0;
  let newPinFirst = '';

  function getPin() { return localStorage.getItem(PIN_KEY) || DEFAULT_PIN; }
  function getData() { try { return JSON.parse(localStorage.getItem(DATA_KEY)) || []; } catch { return []; } }
  function saveData(d) { localStorage.setItem(DATA_KEY, JSON.stringify(d)); }

  function pressKey(k) {
    if (pinInput.length >= 4) return;
    pinInput += k;
    updateDots();
    if (pinInput.length === 4) setTimeout(handleSubmit, 120);
  }

  function deleteKey() { pinInput = pinInput.slice(0, -1); updateDots(); }

  function updateDots() {
    for (let i = 0; i < 4; i++)
      document.getElementById('d' + i).classList.toggle('filled', i < pinInput.length);
  }

  function handleSubmit() {
    if (changingPin) { handleChangePinFlow(); return; }
    if (pinInput === getPin()) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('change-pw-btn').style.display = 'inline';
      pinInput = ''; updateDots();
      renderApp();
    } else {
      document.getElementById('login-error').textContent = 'wrong pin';
      pinInput = ''; updateDots();
      setTimeout(() => document.getElementById('login-error').textContent = '', 1500);
    }
  }

  function lockApp() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-sub').textContent = 'enter pin';
    pinInput = ''; updateDots();
  }

  function startChangePin() {
    changingPin = true; newPinStep = 0; newPinFirst = '';
    pinInput = ''; updateDots();
    document.getElementById('login-sub').textContent = 'enter new pin';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  function handleChangePinFlow() {
    if (newPinStep === 0) {
      newPinFirst = pinInput; newPinStep = 1;
      pinInput = ''; updateDots();
      document.getElementById('login-sub').textContent = 'confirm new pin';
    } else {
      if (pinInput === newPinFirst) {
        localStorage.setItem(PIN_KEY, pinInput);
        changingPin = false; newPinStep = 0;
        pinInput = ''; updateDots();
        document.getElementById('login-sub').textContent = 'enter pin';
        document.getElementById('login-error').textContent = '';
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        renderApp();
        showToast('pin updated!');
      } else {
        document.getElementById('login-error').textContent = "pins don't match";
        pinInput = ''; newPinStep = 0; newPinFirst = '';
        document.getElementById('login-sub').textContent = 'enter new pin';
        updateDots();
        setTimeout(() => document.getElementById('login-error').textContent = '', 1500);
      }
    }
  }

  function renderApp() {
    const now = new Date();
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('today-display').textContent =
      `${DAYS[now.getDay()]} ${now.getDate()} ${MONTHS[now.getMonth()]}`;
    const prevDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    document.getElementById('tab-current').textContent = MONTHS[now.getMonth()];
    document.getElementById('tab-prev').textContent = MONTHS[prevDate.getMonth()];
    renderLog();
  }

  function showMonth(m) {
    activeMonth = m;
    document.getElementById('tab-current').classList.toggle('active', m === 'current');
    document.getElementById('tab-prev').classList.toggle('active', m === 'prev');
    renderLog();
  }

  function getMonthRange(which) {
    const now = new Date();
    let year = now.getFullYear(), month = now.getMonth();
    if (which === 'prev') { month--; if (month < 0) { month = 11; year--; } }
    return { year, month };
  }

  function renderLog() {
    const { year, month } = getMonthRange(activeMonth);
    const entries = getData()
      .filter(e => { const d = new Date(e.date); return d.getFullYear() === year && d.getMonth() === month; })
      .sort((a, b) => new Date(b.date) - new Date(a.date));

    const total = entries.reduce((s, e) => s + e.hours, 0);
    document.getElementById('log-total').textContent = total > 0 ? `${total}h total` : '';

    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const list = document.getElementById('log-list');
    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-log">no entries yet</div>';
      return;
    }
    list.innerHTML = entries.map(e => {
      const d = new Date(e.date + 'T12:00:00');
      return `<div class="log-entry">
        <div class="entry-date">
          <div class="entry-day">${String(d.getDate()).padStart(2,'0')}</div>
          <div class="entry-weekday">${DAYS[d.getDay()]}</div>
        </div>
        <div class="entry-hours">${e.hours}H</div>
        <button class="entry-delete" onclick="deleteEntry('${e.id}')">✕</button>
      </div>`;
    }).join('');
  }

  function logShift(hours) {
    const today = new Date().toISOString().split('T')[0];
    const data = getData();
    if (data.find(e => e.date === today)) { showToast('today already logged'); return; }
    data.push({ id: Date.now().toString(), date: today, hours });
    saveData(data);
    activeMonth = 'current';
    document.getElementById('tab-current').classList.add('active');
    document.getElementById('tab-prev').classList.remove('active');
    renderLog();
    showToast(`+${hours}h logged!`);
  }

  function deleteEntry(id) {
    saveData(getData().filter(e => e.id !== id));
    renderLog();
    showToast('entry deleted');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
